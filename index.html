<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxyGrief.pw — Доноры</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ffd700;
        }
        table {
            width: 80%;
            margin: 0 auto;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        th {
            background: #0f3460;
            color: #ffd700;
            padding: 12px;
            font-size: 18px;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #2a3a5e;
            text-align: center;
        }
        tr:hover {
            background: #1a2a4a;
        }
        .sum {
            color: #00ff88;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🌟 Благодарим наших доноров! 🌟</h1>
    <table>
        <thead>
            <tr>
                <th>№</th>
                <th>Имя</th>
                <th>Сумма</th>
                <th>Дата</th>
            </tr>
        </thead>
        <tbody>
            <!-- Сюда вставляйте строки с донатами -->
            <tr>
                <td>1</td>
                <td>Алексей</td>
                <td class="sum">100 ₽</td>
                <td>2026-06-21</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Мария</td>
                <td class="sum">250 ₽</td>
                <td>2026-06-20</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Дмитрий</td>
                <td class="sum">50 ₽</td>
                <td>2026-06-19</td>
            </tr>
            <!-- Добавляйте новые строки по образцу -->
        </tbody>
    </table>
    <div class="footer">
        ❤️ Спасибо за поддержку! Чтобы добавить свой донат, напишите нам.
    </div>
</body>
</html>
